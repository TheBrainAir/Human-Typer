[os]
# 1 = Mac (pyautogui), 2 = Windows (pynput), 3 = Linux (pynput)
mode = 1

[typing]
# Your MonkeyType stats
wpm = 62
accuracy = 0.93
consistency = 0.69

[delays]
# Countdown before typing starts (seconds)
countdown = 3
# Chance of a mid-word pause (thinking)
think_pause_chance = 0.02
think_pause_min = 0.3
think_pause_max = 0.8
# Burst typing settings
burst_chance = 0.15
burst_min_len = 2
burst_max_len = 5
burst_delay_min = 0.05
burst_delay_max = 0.10
# Backspace speed
backspace_delay_min = 0.06
backspace_delay_max = 0.15
# Pause before retyping after fixing a mistake
retype_pause_min = 0.05
retype_pause_max = 0.2
# Pause when noticing a mistake
notice_pause_min = 0.15
notice_pause_max = 0.45
# Min/max delay per character (clamp)
char_delay_min = 0.05
char_delay_max = 0.6

[text]
# Text to type is stored in a separate file for convenience.
# Just paste your text into text.txt — no special formatting needed.
file = text.txt